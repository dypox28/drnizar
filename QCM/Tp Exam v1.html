        :root {
            --primary: #1e3a8a;
        }
        
        body {
            font-family: 'Roboto', system-ui, sans-serif;

        }

        }

        }

        }

            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .progress {
            width: 180px;
            height: 12px;
            background: #e2e8f0;
            border-radius: 9999px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);

        }

            background: white;

            box-shadow: 0 10px 25px rgba(0,0,0,0.1);

            margin-bottom: 20px;
        }

            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .question-text {
            font-size: 1.35rem;
            font-weight: 500;
            margin-bottom: 25px;
            color: #1e2937;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option-label {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.1rem;
        }
        
        .option-label:hover {
            background: #f1f5f9;
            border-color: #3b82f6;
        }
        
        .option-label input[type="radio"] {
            margin-right: 12px;
            accent-color: var(--primary);
            transform: scale(1.2);
        }
        
        .btn {
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:disabled {
            background: #64748b;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #1e2937;
        }
        
        #feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            line-height: 1.5;
            min-height: 80px;
        }
        
        .correct {
            background: #ecfdf5;
            border: 2px solid #10b981;
            color: #10b981;
        }
        
        .incorrect {
            background: #fef2f2;
            border: 2px solid #ef4444;
            color: #ef4444;
        }
        
        .final-result {
            text-align: center;
            padding: 40px 20px;
        }
        
        .final-score {
            font-size: 3rem;
            font-weight: 700;
            margin: 20px 0;
        }
        
        .motivation {
            font-size: 1.3rem;
            color: #1e3a8a;
            margin-top: 15px;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            color: #64748b;
            font-size: 0.95rem;
        }
        
        @media (max-width: 600px) {
            body { padding: 15px; }
            h1 { font-size: 1.8rem; }
        }

</head>

        let currentQuestion = 0;
        let score = 0;
        let userAnswers = new Array(questions.length).fill(null);

        function loadQuestion() {
            const container = document.getElementById('quiz-container');
            const q = questions[currentQuestion];
            
            let html = `
                <div class="question-number">Question ${currentQuestion + 1} / 60</div>
                <div class="question-text">${q.question}</div>
                <div class="options">
            `;
            
            q.options.forEach((option, index) => {
                const checked = userAnswers[currentQuestion] === index ? 'checked' : '';
                html += `
                    <label class="option-label">
                        <input type="radio" name="answer" value="${index}" ${checked}>
                        ${option}
                    </label>
                `;
            });
            
            html += `</div>`;
            
            // Si déjà répondu, afficher feedback immédiatement
            if (userAnswers[currentQuestion] !== null) {
                const selected = userAnswers[currentQuestion];
                const isCorrect = selected === q.correct;
                html += `
                    <div id="feedback" class="${isCorrect ? 'correct' : 'incorrect'}">
                        ${isCorrect ? 
                            `<strong>✅ Correct !</strong>` : 
                            `<strong>❌ Incorrect.</strong> La réponse correcte est : <strong>${q.options[q.correct]}</strong><br>
                            Notez bien selon le cours : ${q.explanation}<br>
                            <strong>Astuce pour apprendre : ${q.astuce}</strong>`
                        }
                    </div>
                `;
            } else {
                html += `
                    <div style="margin-top:25px;">
                        <button onclick="checkAnswer()" class="btn btn-primary">Vérifier ma réponse</button>
                        <button onclick="nextQuestion()" id="next-btn" class="btn btn-secondary" style="display:none; margin-left:10px;">Suivant →</button>
                    </div>
                    <div id="feedback"></div>
                `;
            }
            
            container.innerHTML = html;
            updateHeader();
        }

        function checkAnswer() {
            const selectedRadio = document.querySelector('input[name="answer"]:checked');
            if (!selectedRadio) {
                alert("Veuillez sélectionner une réponse !");
                return;
            }
            
            const selectedIndex = parseInt(selectedRadio.value);
            userAnswers[currentQuestion] = selectedIndex;
            
            const q = questions[currentQuestion];
            const isCorrect = selectedIndex === q.correct;
            
            if (isCorrect) score++;
            
            // Afficher feedback
            const feedbackDiv = document.getElementById('feedback');
            const nextBtn = document.getElementById('next-btn');
            
            feedbackDiv.className = isCorrect ? 'correct' : 'incorrect';
            feedbackDiv.innerHTML = isCorrect ? 
                `<strong>✅ Correct !</strong>` : 
                `<strong>❌ Incorrect.</strong> La réponse correcte est : <strong>${q.options[q.correct]}</strong><br>
                 Notez bien selon le cours : ${q.explanation}<br>
                 <strong>Astuce pour apprendre : ${q.astuce}</strong>`;
            
            nextBtn.style.display = 'inline-block';
            updateHeader();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                loadQuestion();
            } else {
                showFinalResult();
            }
        }

        function updateHeader() {
            document.getElementById('question-counter').textContent = `${currentQuestion + 1} / 60`;
            document.getElementById('score-value').textContent = score;
            const progress = Math.round(((currentQuestion + (userAnswers[currentQuestion] !== null ? 1 : 0)) / questions.length) * 100);
            document.getElementById('progress-bar').style.width = `${progress}%`;
        }

        function showFinalResult() {
            const container = document.getElementById('quiz-container');
            const percentage = Math.round((score / questions.length) * 100);
            
            let motivation = '';
            if (percentage >= 90) {
                motivation = '🎉 Excellent ! Vous avez maîtrisé les points du cours.';
            } else if (percentage >= 70) {
                motivation = '👍 Très bien ! Revisez seulement les points faibles.';
            } else if (percentage >= 50) {
                motivation = '🧠 Bon effort. Revoyez les TPs 2, 3 et 5.';
            } else {
                motivation = '📚 Reprenez le cours depuis les essais préliminaires et le schéma général.';
            }
            
            container.innerHTML = `
                <div class="final-result">
                    <h2>Quiz terminé !</h2>
                    <div class="final-score">${score} / 60 <span style="font-size:1.5rem;">(${percentage}%)</span></div>
                    <div class="motivation">${motivation}</div>
                    <p style="margin-top:30px; color:#64748b;">Si votre score est élevé (plus de 90%), vous avez maîtrisé les points du cours.<br>Sinon, revisez les parties faibles.</p>
                    <button onclick="restartQuiz()" class="btn btn-primary" style="margin-top:30px;">Recommencer le QCM</button>
                </div>
            `;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            userAnswers = new Array(questions.length).fill(null);
            loadQuestion();
        }

        // Lancement du quiz
        window.onload = function() {
            loadQuestion();
        };
    </script>
