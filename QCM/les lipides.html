<div class="quiz-container" id="quizApp">
    <h1>🧪 QCM - Lipides : définition, classification, rôles et propriétés</h1>
    <div class="sub">Biochimie – 2ème année Pharmacie (d'après cours complet)</div>
    <div>
        <span class="score-board" id="scoreDisplay">Score : 0 / 0</span>

        <!-- question dynamique -->

<script>
    // ================================
    // 60 QUESTIONS (mêmes données)
    // ================================
    const questions = [
        { text: "Quelle propriété physique définit principalement la famille des lipides ?", options: ["La présence d’un groupe phosphate", "La solubilité dans les solvants non polaires", "La présence d’un cycle stéroïde", "Un haut point de fusion"], correct: 1, explanation: "Les lipides sont caractérisés par leur solubilité nulle ou faible dans l'eau et élevée dans les solvants organiques apolaires (méthanol, chloroforme, éther...).", astuce: "تذكر: الليبيدات تذوب في المذيبات العضوية غير القطبية وليس في الماء." },
        { text: "Les lipides peuvent être synthétisés selon deux voies principales basées sur :", options: ["Des thioesters et des unités d'isoprène", "Des acides aminés et des oses", "Des nucléotides et des phosphates", "Des protéines et des acides gras libres"], correct: 0, explanation: "La biochimie précise que les lipides proviennent de condensations de thioesters (carbonions) et/ou de condensations d'unités isoprène (carbocations).", astuce: "مسارات التخليق: إما من thioester أو isoprène." },
        { text: "Parmi les rôles biologiques des lipides naturels, lequel est correct ?", options: ["Uniquement réserves d’énergie", "Composants des membranes, réserves énergétiques, précurseurs d’hormones", "Ils ne servent que de pigments", "Ils sont exclusivement des messagers intracellulaires"], correct: 1, explanation: "Les lipides jouent de nombreux rôles: réserves d'énergie, matériaux de structure (membranes), précurseurs d'hormones stéroïdes, médiateurs, vitamines liposolubles.", astuce: "أدوار متعددة: طاقة، بناء الأغشية، هرمونات وفيتامينات." },
        { text: "Selon l'IUPAC, quels composés sont inclus dans la catégorie des lipides ?", options: ["Acides gras, glycérides, phospholipides, glycolipides", "Uniquement les stéroïdes", "Seulement les terpènes", "Les protéines et les glucides"], correct: 0, explanation: "L'IUPAC inclut les acides gras et dérivés, glycérides, phospholipides, glycolipides. Les stéroïdes sont parfois classés à part mais aussi considérés lipides.", astuce: "IUPAC: أحماض دهنية، غليسريدات، فوسفوليبيدات، جلايكوليبيدات." },
        { text: "Quel acide gras est saturé et possède 16 carbones ?", options: ["Acide stéarique (C18:0)", "Acide palmitique (C16:0)", "Acide oléique (C18:1)", "Acide arachidonique (C20:4)"], correct: 1, explanation: "L'acide palmitique est un acide gras saturé à 16 carbones, très répandu dans la nature.", astuce: "حمض البالمتيك C16:0 مشبع." },
        { text: "Quelle est la configuration la plus fréquente des doubles liaisons dans les acides gras insaturés naturels ?", options: ["Trans", "Cis", "Ortho", "Méta"], correct: 1, explanation: "La grande majorité des acides gras insaturés naturels présentent des doubles liaisons en configuration cis, ce qui diminue le point de fusion.", astuce: "التهيئة الفراغية الطبيعية هي cis." },
        { text: "Que signifie la notation ω-3 pour un acide gras ?", options: ["La première double liaison est sur le carbone 3 à partir du groupement carboxyle", "La première double liaison est sur le 3ème carbone à partir de l'extrémité méthyle (ω)", "Il possède 3 doubles liaisons", "Il a 3 atomes de carbone"], correct: 1, explanation: "La série ω indique la position de la première double liaison en partant du carbone terminal ω (méthyle). ω-3 signifie double liaison entre C3 et C4 à partir de l'extrémité méthyle.", astuce: "ω-3 = الرابطة المزدوجة تبدأ من الكربون الثالث من النهاية." },
        { text: "La vitamine E (α-tocophérol) a un effet :", options: ["Pro-oxydant sur les lipides membranaires", "Protecteur contre la dégradation oxydative des lipides insaturés", "Elle augmente l'oxydation enzymatique", "Elle n'a aucun rôle"], correct: 1, explanation: "La vitamine E, composé terpénique, protège les lipides insaturés des membranes contre l'agression oxydative (radicaux libres, peroxydes).", astuce: "فيتامين E مضاد للأكسدة يحمي الليبيدات." },
        { text: "Quel est le nom de l'indice mesurant la quantité d'iode fixée par 100 g de matière grasse ?", options: ["Indice d'acide", "Indice de saponification", "Indice d'iode", "Indice de peroxyde"], correct: 2, explanation: "L'indice d'iode correspond à la masse d'iode (en g) fixée par addition sur 100 g de matière grasse, évaluant le degré d'insaturation.", astuce: "معدل اليود = كمية اليود التي ترتبط بعدم التشبع." },
        { text: "La transformation des huiles en margarine repose sur quelle réaction chimique ?", options: ["Hydrolyse alcaline", "Hydrogénation des doubles liaisons", "Saponification", "Estérification"], correct: 1, explanation: "L'hydrogénation des acides gras insaturés des huiles permet de les saturer, augmentant le point de fusion et donnant une consistance solide (margarine).", astuce: "هدرجة الزيوت = تحولها إلى دهون صلبة." },
        { text: "Les cérides sont des esters entre :", options: ["Acides gras et glycérol", "Acides gras et alcools aliphatiques à longue chaîne", "Acides gras et stérols", "Acides gras et choline"], correct: 1, explanation: "Les cérides sont des monoesters d'acides gras et d'alcools gras à longue chaîne (saturés, primaires). Ils constituent les cires.", astuce: "شموع: أحماض دهنية + كحولات دهنية طويلة." },
        { text: "Le cholestérol est un stérol essentiel. Quelle est sa fonction principale dans les membranes ?", options: ["Réserve énergétique", "Régulation de la fluidité membranaire et précurseur hormonal", "Cofacteur enzymatique", "Messager hydrophile"], correct: 1, explanation: "Le cholestérol est un composant membranaire régulant la fluidité et la perméabilité ; c'est aussi le précurseur des hormones stéroïdes, acides biliaires et vitamine D.", astuce: "الكوليسترول يضبط سيولة الغشاء وهرمونات." },
        { text: "Quelle enzyme hydrolyse les triacylglycérols en position 1 et 3 dans l'intestin ?", options: ["Lipase pancréatique", "Phospholipase A2", "Lipoprotéine lipase", "Cholestérol estérase"], correct: 0, explanation: "La lipase pancréatique hydrolyse les TAG en émulsion (avec sels biliaires) en libérant des acides gras et du 2-monoacylglycérol.", astuce: "ليباز البنكرياس لهضم الدهون الثلاثية." },
        { text: "Les glycérophospholipides sont des molécules amphipathiques. Cela signifie qu'elles ont :", options: ["Une seule région polaire", "Une partie hydrophobe (acides gras) et une partie hydrophile (tête polaire)", "Deux têtes hydrophiles", "Elles sont totalement hydrophobes"], correct: 1, explanation: "Les glycérophospholipides possèdent une queue hydrophobe (chaînes d'AG) et une tête hydrophile (phosphate + alcool) ; ce sont des amphiphiles.", astuce: "أمفيباثية: رأس قطبي وذيل غير قطبي." },
        { text: "Quelle classe de glycérophospholipides est particulièrement abondante dans le jaune d’œuf et le cerveau ?", options: ["Phosphatidylinositols", "Phosphatidylcholines (lécithines)", "Phosphatidylsérines", "Cardiolipides"], correct: 1, explanation: "Les phosphatidylcholines (lécithines) sont majoritaires dans le jaune d’œuf, le foie et le cerveau.", astuce: "الليسيثين = فوسفاتيديل كولين، غزير في صفار البيض." },
        { text: "La phospholipase C clive les phospholipides au niveau :", options: ["Entre l'acide gras et le glycérol", "Entre le phosphate et l'alcool (tête polaire)", "Entre le glycérol et le phosphate", "Entre les deux acides gras"], correct: 2, explanation: "La phospholipase C hydrolyse la liaison entre le glycérol et le phosphate, produisant du diacylglycérol (DAG) et un phosphate d'alcool.", astuce: "PLC تقطع الرابطة بين الغليسيرول والفوسفات → DAG + IP3." },
        { text: "Quel est le second messager produit à partir du phosphatidylinositol 4,5-bisphosphate sous l'action de la phospholipase C ?", options: ["AMPc", "Inositol 1,4,5-triphosphate (IP3) et DAG", "GMP cyclique", "Arachidonate"], correct: 1, explanation: "La phospholipase C clive le PIP2 en DAG (diacylglycérol) et IP3, tous deux seconds messagers.", astuce: "IP3 و DAG رسل ثانوي من الفوسفاتيديل إينوزيتول." },
        { text: "Les sphingolipides sont formés à partir d'une base sphingoïde. Quelle est la base la plus courante ?", options: ["Sphingosine", "Choline", "Éthanolamine", "Sérine"], correct: 0, explanation: "La sphingosine est un dialcool aminé à longue chaîne. Les sphingolipides sont des amides d'acide gras avec la sphingosine.", astuce: "السفينجوزين هو القاعدة الأمينية." },
        { text: "Les cérébrosides sont des sphingolipides contenant :", options: ["Un groupement phosphate", "Un sucre (galactose ou glucose)", "Plusieurs sucres dont l'acide sialique", "Du cholestérol"], correct: 1, explanation: "Les cérébrosides (glucosylcéramides ou galactosylcéramides) sont des sphingolipides avec un seul ose lié à la sphingosine.", astuce: "سيريبروزيد = سفينغوليبيد + سكر واحد." },
        { text: "Les gangliosides sont abondants dans :", options: ["Le tissu adipeux blanc", "Les ganglions nerveux et la membrane plasmique, comme marqueurs de groupes sanguins", "Les mitochondries", "Les parois bactériennes"], correct: 1, explanation: "Les gangliosides (oligosylcéramides) sont présents dans les ganglions nerveux et à la surface externe des membranes ; ils servent de sites de reconnaissance.", astuce: "غانغليوزيدات → أغشية الخلايا العصبية ومستضدات." },
        { text: "La testostérone et l'œstradiol sont des exemples de :", options: ["Phospholipides", "Stéroïdes (hormones sexuelles)", "Glycérides", "Terpènes"], correct: 1, explanation: "La testostérone (androgène) et l'œstradiol (œstrogène) sont des hormones stéroïdes dérivées du cholestérol.", astuce: "هرمونات الستيرويد الجنسية." },
        { text: "Quel acide gras polyinsaturé est précurseur des prostaglandines ?", options: ["Acide palmitique", "Acide arachidonique (C20:4)", "Acide butyrique", "Acide myristique"], correct: 1, explanation: "L'acide arachidonique est oxydé par la cyclooxygénase pour former les prostaglandines, leucotriènes et thromboxanes.", astuce: "حمض الأراكيدونيك ينتج بروستاغلاندينات." },
        { text: "Quelle est la principale propriété des acides gras à chaîne courte (C4, C5) dans l'eau ?", options: ["Insolubles", "Solubles à cause de leur petite chaîne hydrophobe", "Forment des cires", "Ils sont totalement apolaires"], correct: 1, explanation: "Les acides gras à très courte chaîne (inférieure à C6) présentent une certaine solubilité dans l'eau. Au-delà de C5, ils deviennent insolubles.", astuce: "أحماض دهنية قصيرة تذوب جزئياً في الماء." },
        { text: "Le point de fusion des acides gras saturés augmente avec :", options: ["La présence de doubles liaisons", "La longueur de la chaîne carbonée", "La ramification", "La position cis"], correct: 1, explanation: "Plus la chaîne carbonée est longue (saturée), plus les interactions de Van der Waals sont fortes, augmentant la température de fusion.", astuce: "طول السلسلة المشبعة يرفع درجة الانصهار." },
        { text: "L'indice d'acide mesure :", options: ["Le degré d'insaturation", "La masse de potasse nécessaire pour neutraliser l'acidité libre dans 1g de graisse", "La quantité d'iode fixée", "Le pouvoir émulsifiant"], correct: 1, explanation: "L'indice d'acide correspond à la masse de KOH (en mg) nécessaire pour neutraliser les acides gras libres contenus dans 1 g de matière grasse.", astuce: "حمضية الدهون = مؤشر الحموضة." },
        { text: "Quel est l'effet biologique des prostaglandines ?", options: ["Uniquement pro-inflammatoire", "Contraction muscles lisses, régulation métabolique, agrégation plaquettaire", "Augmentation du cholestérol", "Inhibition des lipases"], correct: 1, explanation: "Les prostaglandines agissent sur la contraction des muscles lisses, la régulation du métabolisme et l'agrégation plaquettaire (aspirine inhibe leur synthèse).", astuce: "بروستاغلاندينات تنظم انقباض العضلات وتجمع الصفائح." },
        { text: "La saponification des glycérides par NaOH donne :", options: ["Glycérol et acides gras libres", "Glycérol et savons (sels d'acides gras)", "Esters et alcools", "Acides biliaires"], correct: 1, explanation: "La saponification est l'hydrolyse alcaline des esters : les acides gras sont libérés sous forme de sels de sodium (savons durs) et le glycérol.", astuce: "تصبن = صابون + غليسيرول." },
        { text: "Quelle famille d'acides gras contient des cycles propane comme l'acide lactobacillique ?", options: ["Acides gras hydroxylés", "Acides gras cyclopropaniques", "Acides gras ramifiés", "Acides mycoliques"], correct: 1, explanation: "L'acide lactobacillique est un acide gras C18 avec un cycle propane, typique des acides gras cyclopropaniques.", astuce: "حلقات البروبان في بعض الأحماض الدهنية البكتيرية." },
        { text: "Les acides mycoliques (bacille de Koch) sont caractérisés par :", options: ["Des chaînes très courtes", "Des groupements alkyle en C2 et hydroxyle en C3, parfois des cycles propane", "Absence de fonctions", "Plusieurs doubles liaisons conjuguées"], correct: 1, explanation: "Les acides mycoliques sont des acides gras à longue chaîne (C52) avec un groupement butyle en C2, hydroxyle en C3 et parfois des cycles propane.", astuce: "أحماض مايكوليك مميزة للمتفطرة السلية." },
        { text: "Dans la numérotation stéréospécifique (sn) des triacylglycérols, le carbone 2 correspond :", options: ["À l'OH primaire du glycérol", "À l'OH secondaire du glycérol", "À l'extrémité méthyle", "À l'atome de carbone portant le phosphate"], correct: 1, explanation: "Dans la nomenclature sn, le carbone 2 du glycérol porte la fonction alcool secondaire (celui du milieu). Les carbones 1 et 3 sont primaires.", astuce: "sn-2 هو الكربون الثانوي للغليسيرول." },
        { text: "Le rôle de réservoir d'eau chez le chameau est lié aux :", options: ["Phospholipides", "Triacylglycérols (graisse de la bosse)", "Cholestérol", "Glycolipides"], correct: 1, explanation: "La bosse du chameau stocke des triacylglycérols, dont l'oxydation produit de l'eau métabolique, une adaptation au désert.", astuce: "الدهون الثلاثية في سنام الجمل مصدر للماء." },
        { text: "Quel stérol est présent dans les membranes des champignons et levures ?", options: ["Cholestérol", "Ergostérol", "Lanostérol", "Stigmastérol"], correct: 1, explanation: "L'ergostérol est le stérol majeur des membranes fongiques et des levures, analogue fonctionnel du cholestérol.", astuce: "إرغوستيرول في الفطريات والخمائر." },
        { text: "Quelle est la caractéristique des cardiolipides (diphosphatidylglycérol) ?", options: ["Un seul acide gras", "Deux molécules d'acide phosphatidique liées par un glycérol", "Ils contiennent de la sérine", "Ils sont exclusivement végétaux"], correct: 1, explanation: "Les cardiolipides sont formés de deux phosphatidylglycérols liés via un glycérol central ; importants dans la membrane mitochondriale interne.", astuce: "كارديوليبين = ثنائي الفوسفاتيديل غليسيرول." },
        { text: "L'aspirine exerce un effet antiagrégant plaquettaire en inhibant :", options: ["Lipase", "Phospholipase A2", "Cyclooxygénase (COX)", "Cholestérol estérase"], correct: 2, explanation: "L'aspirine inhibe la cyclooxygénase plaquettaire, bloquant la synthèse de thromboxane A2, un médiateur pro-agrégant.", astuce: "الأسبرين يثبط سيكلواوكسيجيناز ويمنع التجلط." },

        { text: "L'acide oléique (C18:1) est un acide gras :", options: ["Saturé", "Monoinsaturé cis", "Polyinsaturé ω-6", "Cyclopropanique"], correct: 1, explanation: "L'acide oléique possède une double liaison en position 9 en configuration cis, c'est le plus abondant des acides gras monoinsaturés.", astuce: "حمض الأولييك أحادي عدم التشبع cis." },
        { text: "Quelle substance est utilisée en thérapeutique comme antiagrégant plaquettaire ?", options: ["Vitamine E", "Aspirine (inhibiteur de COX)", "Acide arachidonique", "Prostaglandine E2"], correct: 1, explanation: "L'aspirine inhibe irréversiblement la cyclooxygénase, réduisant la synthèse de thromboxane A2, effet antiagrégant.", astuce: "أسبرين يثبط COX ويمنع تجمع الصفائح." },
        { text: "Les lipides complexes (hétérolipides) contiennent en plus des éléments comme :", options: ["Phosphate, sulfate ou glucidique", "Seulement du phosphate", "Azote uniquement", "Des métaux"], correct: 0, explanation: "Les lipides complexes (phospholipides, glycolipides, sulfolipides) renferment des groupements additionnels phosphate, sulfate ou osidiques.", astuce: "ليبيدات معقدة: فوسفات، سلفات، سكريات." },
        { text: "Les lysophospholipides résultent de l'action de :", options: ["Phospholipase A1 ou A2 (élimination d'un acide gras)", "Phospholipase C", "Phospholipase D", "Lipase hormonosensible"], correct: 0, explanation: "Une phospholipase A1 ou A2 libère un acide gras, générant un lysophospholipide (monoacylglycérophospholipide).", astuce: "ليزوفوسفوليبيد = ناتج إزالة حمض دهني واحد." },
        { text: "Le caractère tensioactif des acides gras et phospholipides est dû à :", options: ["Leur hydrophobicité totale", "La structure amphipathique abaissant la tension superficielle", "La présence de cycles", "Leur masse molaire élevée"], correct: 1, explanation: "Les molécules amphipathiques (tête polaire + queue hydrophobe) s'orientent aux interfaces et réduisent la tension superficielle.", astuce: "خاصية الفعل السطحي بسبب التركيب الأمفيباثي." },
        { text: "Quel est le nombre maximal de doubles liaisons dans les acides gras naturels courants ?", options: ["2", "4", "6", "8"], correct: 2, explanation: "Les acides gras naturels ont jusqu'à 6 doubles liaisons (ex: acide docosahexaénoïque C22:6).", astuce: "حتى 6 روابط مزدوجة في الأحماض الدهنية الطبيعية." },
        { text: "Les myélines sont riches en :", options: ["Triacylglycérols", "Sphingolipides et cholestérol", "Cires", "Glycéroglycolipides"], correct: 1, explanation: "La gaine de myéline entourant les axones est très riche en sphingolipides (cérébrosides) et cholestérol.", astuce: "المايلين غني بالسفينغوليبيدات والكوليسترول." },
        { text: "La dégradation des lipides insaturés membranaires par les espèces réactives de l'oxygène est appelée :", options: ["Saponification", "Peroxydation lipidique", "Hydrolyse enzymatique", "Estérification"], correct: 1, explanation: "L'oxydation par les radicaux libres entraîne la peroxydation des lipides, altérant les membranes.", astuce: "تأكسد الليبيدات = بيروكسدة ضارة." },
        { text: "Les stérides résultent de l'estérification d'acides gras par :", options: ["Glycérol", "Stérols (ex: cholestérol)", "Alcools gras", "Sphingosine"], correct: 1, explanation: "Les stérides sont des esters d'acides gras avec des stérols (ex: cholestérol estérifié).", astuce: "ستريدات = أحماض دهنية + ستيرولات." },
        { text: "Les triacylglycérols sont hydrophobes car :", options: ["Ils ont des groupements polaires libres", "Les hydroxyles du glycérol sont engagés dans des liaisons esters, plus de groupes polaires", "Ils contiennent du phosphate", "Ils sont chargés"], correct: 1, explanation: "Dans les triacylglycérols, les trois fonctions alcool sont estérifiées, supprimant tout groupement polaire, ce qui les rend totalement apolaires.", astuce: "الدهون الثلاثية غير قطبية لعدم وجود مجموعات OH حرة." },
        { text: "Le site d'action de la lipase pancréatique nécessite :", options: ["Un pH acide", "Des sels biliaires et la colipase", "Une température de 50°C", "Du NADPH"], correct: 1, explanation: "La lipase pancréatique agit en émulsion grâce aux sels biliaires, et nécessite la colipase comme facteur protéique.", astuce: "ليباز البنكرياس يعمل مع أملاح الصفراء والكوليباز." },
        { text: "La vitamine D est synthétisée à partir de :", options: ["Acide arachidonique", "Cholestérol (7-déhydrocholestérol)", "Sphingosine", "Phosphatidylcholine"], correct: 1, explanation: "Le 7-déhydrocholestérol (dérivé du cholestérol) est converti en vitamine D3 sous l'action des UV.", astuce: "فيتامين D مشتق من الكوليسترول." },
        { text: "Les acides gras saturés à nombre pair de carbones sont majoritaires dans :", options: ["Les huiles de poisson", "Les graisses animales et végétales", "Les cires uniquement", "Les sphingolipides"], correct: 1, explanation: "Les acides gras saturés à chaîne droite et nombre pair (palmitique, stéarique) sont très répandus dans les graisses animales et végétales.", astuce: "أحماض دهنية مشبعة زوجية في الشحوم الحيوانية والنباتية." },
        { text: "Quelle est la signification de l'indice de saponification ?", options: ["Masse de KOH pour neutraliser AG libres", "Masse de KOH pour saponifier les esters d'1g de matière grasse", "Degré d'insaturation", "Indice de rancissement"], correct: 1, explanation: "L'indice de saponification représente la masse de KOH (mg) nécessaire pour saponifier les esters présents dans 1 g de corps gras.", astuce: "رقم التصبن = كمية KOH لتصبن الدهون." }
    ];

    const STORAGE_KEY = "qcm_lipides_progress";
    const LAST_RESULT_KEY = "qcm_lipides_last_result";
    const WRONG_QUESTIONS_KEY = "qcm_lipides_wrong_questions";
    const totalQuestions = questions.length;

    let currentIndex = 0;
    let userAnswers = new Array(totalQuestions).fill(null);
    let answerLocked = false;
    let reviewMode = false;
    let wrongQuestionsList = []; // Liste des indices des questions fausses
    let reviewCurrentIndex = 0;
    let reviewAnswers = []; // Réponses en mode révision

    const questionArea = document.getElementById('questionArea');
    const scoreSpan = document.getElementById('scoreDisplay');
    const lastScoreSpan = document.getElementById('lastScoreDisplay');
    const resumeBanner = document.getElementById('resumeBanner');
    const modeBadge = document.getElementById('modeBadge');

    // ========== Sauvegarde / Chargement ==========
    function saveProgress() {
        if (reviewMode) return; // Ne pas sauvegarder la progression en mode révision
        const data = {
            userAnswers: userAnswers,
            currentIndex: currentIndex,
            lastUpdated: new Date().toISOString()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadProgress() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.userAnswers && data.userAnswers.length === totalQuestions) {
                    userAnswers = data.userAnswers;
                    currentIndex = data.currentIndex;
                    if (currentIndex >= totalQuestions) currentIndex = totalQuestions - 1;
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }

    function saveWrongQuestions() {
        const wrongIndices = [];
        for (let i = 0; i < totalQuestions; i++) {
            if (userAnswers[i] !== null && userAnswers[i] !== questions[i].correct) {
                wrongIndices.push(i);
            }
        }
        localStorage.setItem(WRONG_QUESTIONS_KEY, JSON.stringify(wrongIndices));
        return wrongIndices;
    }

    function loadWrongQuestions() {
        const saved = localStorage.getItem(WRONG_QUESTIONS_KEY);
        if (saved) {
            try {
                return JSON.parse(saved);
            } catch(e) {}
        }
        return [];
    }

    function saveLastResult(correctCount) {
        const result = {
            correct: correctCount,
            total: totalQuestions,
            percentage: ((correctCount / totalQuestions) * 100).toFixed(1),
            date: new Date().toLocaleString()
        };
        localStorage.setItem(LAST_RESULT_KEY, JSON.stringify(result));
        updateLastResultDisplay();
    }

    function updateLastResultDisplay() {
        const saved = localStorage.getItem(LAST_RESULT_KEY);
        if (saved) {
            try {
                const res = JSON.parse(saved);
                lastScoreSpan.innerText = `📊 Dernier résultat: ${res.correct}/${res.total} (${res.percentage}%)`;
            } catch(e) {
                lastScoreSpan.innerText = `📊 Dernier résultat: --`;
            }
        } else {
            lastScoreSpan.innerText = `📊 Dernier résultat: --`;
        }
    }

    function updateScore() {
        let correctCount = 0;
        for (let i = 0; i < totalQuestions; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === questions[i].correct) correctCount++;
        }
        scoreSpan.innerText = `Score : ${correctCount} / ${totalQuestions}`;
        return correctCount;
    }

    function updateWrongCountDisplay() {
        const wrongCount = saveWrongQuestions().length;
        const wrongCounter = document.getElementById('wrongCounter');
        if (wrongCounter) {
            if (wrongCount > 0) {
                wrongCounter.innerText = `❌ À revoir: ${wrongCount}`;
                wrongCounter.style.display = 'inline-block';
            } else {
                wrongCounter.style.display = 'none';
            }
        }
    }

    function checkAndShowResumeBanner() {
        const hasProgress = userAnswers.some(a => a !== null);
        const isComplete = userAnswers.every(a => a !== null);
        
        if (hasProgress && !isComplete && !reviewMode && currentIndex > 0) {
            const answeredCount = userAnswers.filter(a => a !== null).length;
            resumeBanner.innerHTML = `📌 Vous étiez à la question ${currentIndex + 1} (${answeredCount}/${totalQuestions} répondues). Cliquez ici pour continuer.`;
            resumeBanner.style.display = "block";
            resumeBanner.onclick = () => {
                resumeBanner.style.display = "none";
                renderCurrentQuestion();
            };
        } else {
            resumeBanner.style.display = "none";
        }
    }

    // ========== Mode Révision ==========
    function startReviewMode() {
        const wrongIndices = saveWrongQuestions();
        
        if (wrongIndices.length === 0) {
            alert("🎉 Félicitations ! Vous n'avez aucune erreur à réviser. Toutes vos réponses sont correctes !");
            return;
        }
        
        reviewMode = true;
        wrongQuestionsList = [...wrongIndices];
        reviewCurrentIndex = 0;
        reviewAnswers = new Array(wrongQuestionsList.length).fill(null);
        
        modeBadge.style.display = "inline-block";
        modeBadge.innerHTML = `📖 Mode Révision (${wrongQuestionsList.length} questions à revoir)`;
        
        renderReviewQuestion();
    }
    
    function renderReviewQuestion() {
        if (reviewCurrentIndex >= wrongQuestionsList.length) {
            // Fin de la révision
            const correctInReview = reviewAnswers.filter((a, idx) => a === questions[wrongQuestionsList[idx]].correct).length;
            const message = `📚 Révision terminée !\nVous avez corrigé ${correctInReview}/${wrongQuestionsList.length} questions.\n`;
            
            if (correctInReview === wrongQuestionsList.length) {
                alert("🎉 Bravo ! Vous avez corrigé toutes vos erreurs !");
            } else {
                alert(`📝 ${message}\nContinuez à réviser pour maîtriser toutes les questions.`);
            }
            
            exitReviewMode();
            return;
        }
        
        const originalIndex = wrongQuestionsList[reviewCurrentIndex];
        const q = questions[originalIndex];
        const selectedIdx = reviewAnswers[reviewCurrentIndex];
        const isAnswered = (selectedIdx !== null);
        const isCorrect = (isAnswered && selectedIdx === q.correct);
        
        let feedbackHtml = '';
        if (isAnswered) {
            if (isCorrect) {
                feedbackHtml = `<div class="feedback correct">✅ Correct ! ${q.explanation}</div>`;
            } else {
                feedbackHtml = `<div class="feedback wrong">❌ Encore faux. La réponse correcte est : ${q.options[q.correct]}.<br>📘 ${q.explanation}<br>💡 ${q.astuce}</div>`;
            }
        }
        
        let optionsHtml = '';
        for (let i = 0; i < q.options.length; i++) {
            const checkedAttr = (selectedIdx === i) ? 'checked' : '';
            optionsHtml += `
                <div class="opt" data-opt-index="${i}">
                    <input type="radio" name="reviewQuestion" value="${i}" id="rev_opt_${i}" ${checkedAttr} ${isAnswered ? 'disabled' : ''}>
                    <label for="rev_opt_${i}">${String.fromCharCode(65+i)}. ${q.options[i]}</label>
                </div>
            `;
        }
        
        const isLast = (reviewCurrentIndex === wrongQuestionsList.length - 1);
        const nextText = isLast ? "Terminer la révision" : "Question suivante";
        
        const html = `
            <div class="question-card">
                <div class="progress-stats">
                    <span>📖 Révision: ${reviewCurrentIndex + 1} / ${wrongQuestionsList.length}</span>
                    <span>📝 Question originale #${originalIndex + 1}</span>
                </div>
                <div class="q-text">${q.text}</div>
                <div class="options" id="reviewOptionsContainer">
                    ${optionsHtml}
                </div>
                ${feedbackHtml}
                <div class="btn-group">
                    <button id="reviewVerifyBtn" ${isAnswered ? 'disabled' : ''}>Vérifier</button>
                    <button id="reviewNextBtn">${nextText}</button>
                    <button id="exitReviewBtn" class="reset-btn">🚪 Quitter la révision</button>
                </div>
            </div>
        `;
        questionArea.innerHTML = html;
        
        document.getElementById('reviewVerifyBtn')?.addEventListener('click', () => handleReviewVerify());
        document.getElementById('reviewNextBtn')?.addEventListener('click', () => handleReviewNext());
        document.getElementById('exitReviewBtn')?.addEventListener('click', () => exitReviewMode());
        
        document.querySelectorAll('.opt').forEach(opt => {
            opt.addEventListener('click', (e) => {
                if (reviewAnswers[reviewCurrentIndex] !== null) return;
                const radio = opt.querySelector('input[type="radio"]');
                if (radio && !radio.disabled) radio.checked = true;
            });
        });
    }
    
    function handleReviewVerify() {
        if (reviewAnswers[reviewCurrentIndex] !== null) return;
        const selectedRadio = document.querySelector('input[name="reviewQuestion"]:checked');
        if (!selectedRadio) {
            alert("Veuillez sélectionner une réponse.");
            return;
        }
        const selectedVal = parseInt(selectedRadio.value);
        reviewAnswers[reviewCurrentIndex] = selectedVal;
        renderReviewQuestion();
    }
    
    function handleReviewNext() {
        if (reviewAnswers[reviewCurrentIndex] === null) {
            alert("Veuillez vérifier votre réponse avant de continuer.");
            return;
        }
        
        reviewCurrentIndex++;
        renderReviewQuestion();
    }
    
    function exitReviewMode() {
        reviewMode = false;
        modeBadge.style.display = "none";
        renderCurrentQuestion();
    }
    
    // ========== Rendu normal ==========
    function renderCurrentQuestion() {
        if (reviewMode) {
            renderReviewQuestion();
            return;
        }
        
        const q = questions[currentIndex];
        const selectedIdx = userAnswers[currentIndex];
        const isAnswered = (selectedIdx !== null);
        const isCorrect = (isAnswered && selectedIdx === q.correct);
        
        let feedbackHtml = '';
        if (isAnswered) {
            const correctText = q.options[q.correct];
            const explanation = q.explanation;
            const astuce = q.astuce;
            if (isCorrect) {
                feedbackHtml = `<div class="feedback correct">✅ Correct ! ${explanation}</div>`;
            } else {
                feedbackHtml = `<div class="feedback wrong">❌ Incorrect. La réponse correcte est : ${correctText}.<br>📘 ${explanation}<br>💡 Astuce : ${astuce}</div>`;
            }
        }
        
        let optionsHtml = '';
        for (let i = 0; i < q.options.length; i++) {
            const checkedAttr = (selectedIdx === i) ? 'checked' : '';
            optionsHtml += `
                <div class="opt" data-opt-index="${i}">
                    <input type="radio" name="question" value="${i}" id="opt_${i}" ${checkedAttr} ${isAnswered ? 'disabled' : ''}>
                    <label for="opt_${i}">${String.fromCharCode(65+i)}. ${q.options[i]}</label>
                </div>
            `;
        }
        
        const isLastQuestion = (currentIndex === totalQuestions - 1);
        const nextText = isLastQuestion ? "Terminer" : "Suivant";
        const wrongCount = saveWrongQuestions().length;
        
        const html = `
            <div class="question-card">
                <div class="progress-stats">
                    <span>📊 Question ${currentIndex+1} / ${totalQuestions}</span>
                    <span id="wrongCounter" class="wrong-counter" style="display: ${wrongCount > 0 ? 'inline-block' : 'none'}">❌ À revoir: ${wrongCount}</span>
                </div>
                <div class="q-text">${q.text}</div>
                <div class="options" id="optionsContainer">
                    ${optionsHtml}
                </div>
                ${feedbackHtml}
                <div class="btn-group">
                    <button id="verifyBtn" ${isAnswered ? 'disabled' : ''}>Vérifier</button>
                    <button id="nextBtn">${nextText}</button>
                    <button id="reviewWrongBtn" class="review-btn">📖 Réviser mes erreurs</button>
                    <button id="resetQuizBtn" class="reset-btn">🔄 Recommencer</button>
                    <button id="clearProgressBtn" class="clear-progress-btn">🗑️ Effacer progression</button>
                </div>
            </div>
        `;
        questionArea.innerHTML = html;
        
        document.getElementById('verifyBtn')?.addEventListener('click', () => handleVerify());
        document.getElementById('nextBtn')?.addEventListener('click', () => handleNext());
        document.getElementById('reviewWrongBtn')?.addEventListener('click', () => startReviewMode());
        document.getElementById('resetQuizBtn')?.addEventListener('click', () => resetQuiz());
        document.getElementById('clearProgressBtn')?.addEventListener('click', () => clearAllProgress());
        
        document.querySelectorAll('.opt').forEach(opt => {
            opt.addEventListener('click', (e) => {
                if (userAnswers[currentIndex] !== null) return;
                const radio = opt.querySelector('input[type="radio"]');
                if (radio && !radio.disabled) radio.checked = true;
            });
        });
        
        const radios = document.querySelectorAll('input[name="question"]');
        radios.forEach(radio => {
            radio.addEventListener('change', (e) => {});
        });
    }
    
    function handleVerify() {
        if (userAnswers[currentIndex] !== null) return;
        const selectedRadio = document.querySelector('input[name="question"]:checked');
        if (!selectedRadio) {
            alert("Veuillez sélectionner une réponse avant de vérifier.");
            return;
        }
        const selectedVal = parseInt(selectedRadio.value);
        userAnswers[currentIndex] = selectedVal;
        saveProgress();
        saveWrongQuestions();
        updateScore();
        updateWrongCountDisplay();
        renderCurrentQuestion();
    }
    
    function handleNext() {
        if (userAnswers[currentIndex] === null) {
            alert("Veuillez vérifier votre réponse avant de passer à la question suivante.");
            return;
        }
        
        if (currentIndex < totalQuestions - 1) {
            currentIndex++;
            saveProgress();
            renderCurrentQuestion();
        } else {
            const finalScore = updateScore();
            const percent = (finalScore/totalQuestions)*100;
            saveLastResult(finalScore);
            saveWrongQuestions();
            
            const wrongCount = saveWrongQuestions().length;
            let message = `🏆 Quiz terminé ! Score final : ${finalScore} / ${totalQuestions} (${percent.toFixed(1)}%).\n`;
            if (wrongCount > 0) {
                message += `\n❌ Questions à réviser : ${wrongCount}\nCliquez sur "Réviser mes erreurs" pour les revoir.`;
            } else {
                message += `\n🎉 Parfait ! Aucune erreur à réviser.`;
            }
            alert(message);
            
            const finishDiv = document.createElement('div');
            finishDiv.className = 'finish-message';
            finishDiv.innerText = message;
            if(!document.querySelector('.finish-message')) {
                questionArea.insertAdjacentHTML('beforeend', `<div class="finish-message">${message}</div>`);
            }
            updateWrongCountDisplay();
        }
    }
    
    function resetQuiz() {
        if (confirm("🔄 Voulez-vous vraiment recommencer le quiz ? Votre progression actuelle sera perdue.")) {
            userAnswers = new Array(totalQuestions).fill(null);
            currentIndex = 0;
            saveProgress();
            updateScore();
            updateWrongCountDisplay();
            renderCurrentQuestion();
            resumeBanner.style.display = "none";
        }
    }
    
    function clearAllProgress() {
        if (confirm("⚠️ ATTENTION : Effacer toute la progression ET les résultats sauvegardés ? Cette action est irréversible.")) {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(LAST_RESULT_KEY);
            localStorage.removeItem(WRONG_QUESTIONS_KEY);
            userAnswers = new Array(totalQuestions).fill(null);
            currentIndex = 0;
            updateScore();
            updateLastResultDisplay();
            updateWrongCountDisplay();
            renderCurrentQuestion();
            resumeBanner.style.display = "none";
            alert("✅ Toute la progression a été effacée. Vous pouvez recommencer depuis le début.");
        }
    }
    
    // ========== Initialisation ==========
    const loaded = loadProgress();
    updateLastResultDisplay();
    updateScore();
    updateWrongCountDisplay();
    renderCurrentQuestion();
    
    if (loaded && !reviewMode) {
        checkAndShowResumeBanner();
    }
</script>
</body>
</html>
