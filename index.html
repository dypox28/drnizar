<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>📚 Cours & Examens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            padding: 1.5rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* Header principal */
        .main-header {
            background: #1e2a3e;
            padding: 1.8rem 1.8rem;
            border-bottom: 4px solid #f59e0b;
        }

        .main-header h1 {
            color: white;
            font-size: 1.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        /* chaque section (Biochimie / Mineral Exam) */
        .section {
            padding: 0 1.5rem;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 1.8rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 3px solid #e2e8f0;
        }

        .section-title .emoji {
            font-size: 1.6rem;
        }

        .course-list {
            list-style: none;
            margin-bottom: 1.5rem;
        }

        .course-list li {
            margin-bottom: 0.8rem;
        }

        .course-list a {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #f8fafc;
            padding: 0.9rem 1.3rem;
            border-radius: 1.2rem;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            color: #0f172a;
            transition: all 0.25s;
            border: 1px solid #e2e8f0;
        }

        /* icône différente selon la section (on peut personnaliser) */
        .course-list a::before {
            font-size: 1.3rem;
            transition: transform 0.2s;
        }

        /* Pour la section Biochimie */
        .section:first-of-type .course-list a::before {
            content: "🧪";
        }

        /* Pour la section Mineral Exam */
        .section:last-of-type .course-list a::before {
            content: "⛏️";
        }

        .course-list a:hover {
            background: #ffffff;
            border-color: #f59e0b;
            transform: translateX(6px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
        }

        .course-list a:hover::before {
            transform: scale(1.1);
        }

        .footer-note {
            padding: 1.2rem 1.8rem 1.8rem;
            border-top: 1px solid #eef2f6;
            font-size: 0.8rem;
            color: #5b6e8c;
            text-align: center;
            margin-top: 0.5rem;
        }

        /* ========== RESPONSIVE (الهاتف) ========== */
        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .main-header {
                padding: 1.3rem 1.2rem;
            }

            .main-header h1 {
                font-size: 1.5rem;
            }

            .section {
                padding: 0 1.2rem;
            }

            .section-title {
                font-size: 1.3rem;
                margin-top: 1.4rem;
            }

            .course-list a {
                padding: 0.75rem 1rem;
                font-size: 1rem;
            }

            .course-list a::before {
                font-size: 1.2rem;
            }

            .footer-note {
                font-size: 0.7rem;
                padding: 1rem 1.2rem 1.4rem;
            }
        }

        @media (min-width: 1400px) {
            .container {
                max-width: 900px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-header">
            <h1>
                📚 Cours & Examens
                <span class="badge" style="background:#f59e0b; color:#1e2a3e; font-size:0.8rem; padding:0.2rem 0.8rem; border-radius:40px;">Préparation</span>
            </h1>
        </div>

        <!-- قسم البيوشيمي -->
        <div class="section">
            <div class="section-title">
                <span class="emoji">🧬</span> Biochimie
            </div>
            <ul class="course-list">
                <li><a href="QCM/les lipides.html">Les lipides</a></li>
                <!-- تقدر تزيد glucides / protéines هنا -->
            </ul>
        </div>

        <!-- قسم Mineral Exam (بالانجليزية) -->
        <div class="section">
            <div class="section-title">
                <span class="emoji">⛏️🧪</span> Mineral Exam
            </div>
            <ul class="course-list">
                <li><a href="QCM/Tp Exam v1.html">Tp Exam v1</a></li>
                <li><a href="QCM/Tp Exam v2.html">Tp Exam v2</a></li>
                <li><a href="QCM/Tp Exam v3.html">Tp Exam v3</a></li>
            </ul>
        </div>

        <div class="footer-note">
            ✨ Sélectionne un cours ou un examen pour commencer
        </div>
    </div>
</body>
</html>
