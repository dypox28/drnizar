<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>📚 Cours & Examens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== متغيرات الضوء والدارك ========== */
        :root {
            --bg-body: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            --bg-container: #ffffff;
            --text-color: #0f172a;
            --header-bg: #1e2a3e;
            --header-text: white;
            --border-color: #e2e8f0;
            --card-bg: #f8fafc;
            --quote-bg: #fef9e6;
            --quote-border: #f59e0b;
            --quote-text: #7c5e10;
            --footer-text: #5b6e8c;
            --section-bg: #f1f5f9;
            --section-text: #0f172a;
        }

        body.dark {
            --bg-body: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --bg-container: #1e293b;
            --text-color: #f1f5f9;
            --header-bg: #0f172a;
            --header-text: #f1f5f9;
            --border-color: #334155;
            --card-bg: #334155;
            --quote-bg: #2d3a4e;
            --quote-border: #f59e0b;
            --quote-text: #fde68a;
            --footer-text: #94a3b8;
            --section-bg: #334155;
            --section-text: #f1f5f9;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            padding: 1.5rem;
            transition: background 0.3s ease;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-container);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* Header */
        .main-header {
            background: var(--header-bg);
            padding: 1.5rem 1.8rem;
            border-bottom: 4px solid #f59e0b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .main-header h1 {
            color: var(--header-text);
            font-size: 1.7rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .badge {
            background: #f59e0b;
            color: #1e2a3e;
            font-size: 0.75rem;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
        }

        /* زر الدارك مود */
        .darkmode-toggle {
            background: rgba(255,255,255,0.1);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.4rem 0.7rem;
            border-radius: 2rem;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }

        .darkmode-toggle:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        /* اقتباس ستايليش صغير فوق */
        .stylish-quote {
            background: var(--quote-bg);
            margin: 1rem 1.5rem 0 1.5rem;
            padding: 0.7rem 1.2rem;
            border-radius: 1rem;
            border-left: 4px solid var(--quote-border);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            transition: all 0.3s ease;
        }

        .quote-icon {
            font-size: 1.4rem;
        }

        .quote-stylish-text {
            font-size: 0.85rem;
            color: var(--quote-text);
            font-style: italic;
            flex: 1;
        }

        .quote-stylish-dua {
            font-size: 0.75rem;
            color: var(--quote-text);
            background: rgba(0,0,0,0.05);
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
        }

        body.dark .quote-stylish-dua {
            background: rgba(255,255,255,0.1);
        }

        /* ===== عناوين الأقسام (التحسين الجديد) ===== */
        .section {
            padding: 0 1.5rem;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.35rem;
            font-weight: 700;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            padding: 0.65rem 1rem;
            background: var(--section-bg);
            border-radius: 1rem;
            border-left: 5px solid #f59e0b;
            color: var(--section-text);
            transition: all 0.3s ease;
        }

        .section-title .emoji {
            font-size: 1.5rem;
        }

        .course-list {
            list-style: none;
            margin-bottom: 1.5rem;
        }

        .course-list li {
            margin-bottom: 0.7rem;
        }

        .course-list a {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--card-bg);
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-color);
            transition: all 0.25s;
            border: 1px solid var(--border-color);
        }

        .course-list a::before {
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .section:first-of-type .course-list a::before {
            content: "🧪";
        }

        .section:last-of-type .course-list a::before {
            content: "⛏️";
        }

        .course-list a:hover {
            background: var(--bg-container);
            border-color: #f59e0b;
            transform: translateX(5px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
        }

        .footer-note {
            padding: 1rem 1.5rem 1.5rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.75rem;
            color: var(--footer-text);
            text-align: center;
            margin-top: 0.2rem;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .main-header { padding: 1rem 1.2rem; }
            .main-header h1 { font-size: 1.3rem; }
            .darkmode-toggle { font-size: 1.2rem; padding: 0.3rem 0.6rem; }
            .stylish-quote { margin: 0.8rem 1.2rem 0 1.2rem; padding: 0.5rem 1rem; }
            .quote-stylish-text { font-size: 0.75rem; }
            .section { padding: 0 1.2rem; }
            .section-title { font-size: 1.15rem; padding: 0.5rem 0.8rem; margin-top: 1.2rem; }
            .course-list a { padding: 0.65rem 1rem; font-size: 0.9rem; }
            .footer-note { font-size: 0.65rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-header">
            <h1>
                📚 Cours & Examens
                <span class="badge">Préparation</span>
            </h1>
            <button class="darkmode-toggle" id="darkModeToggle" aria-label="Dark mode">🌙</button>
        </div>

        <!-- اقتباس ستايليش -->
        <div class="stylish-quote">
            <div class="quote-icon">✨</div>
            <div class="quote-stylish-text">
                « بينما أنت تلهو هناك، من يصنع مجدًا »
            </div>
            <div class="quote-stylish-dua">
                🤲 دعواتكم لي بالتوفيق
            </div>
        </div>

        <!-- Biochimie -->
        <div class="section">
            <div class="section-title">
                <span class="emoji">🧬</span> Biochimie
            </div>
            <ul class="course-list">
                <li><a href="QCM/les lipides.html">Les lipides</a></li>
            </ul>
        </div>

        <!-- Mineral Exam -->
        <div class="section">
            <div class="section-title">
                <span class="emoji">⛏️🧪</span> Mineral Exam
            </div>
            <ul class="course-list">
                <li><a href="QCM/Tp Exam v1.html">Tp Exam v1</a></li>
                <li><a href="QCM/Tp Exam v2.html">Tp Exam v2</a></li>
                <li><a href="QCM/Tp Exam v3.html">Tp Exam v3</a></li>
            </ul>
        </div>

        <div class="footer-note">
            ✨ Sélectionne un cours ou un examen pour commencer
        </div>
    </div>

    <script>
        const toggle = document.getElementById('darkModeToggle');
        const body = document.body;

        if (localStorage.getItem('darkMode') === 'enabled') {
            body.classList.add('dark');
            toggle.textContent = '☀️';
        }

        toggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            if (body.classList.contains('dark')) {
                localStorage.setItem('darkMode', 'enabled');
                toggle.textContent = '☀️';
            } else {
                localStorage.setItem('darkMode', 'disabled');
                toggle.textContent = '🌙';
            }
        });
    </script>
</body>
</html>
